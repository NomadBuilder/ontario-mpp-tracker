  WORDPRESS EMBED — copy the block below into a Custom HTML block

  STEP 1: Upload this entire folder to your web host via cPanel File Manager

  STEP 2: In WordPress, create a new Page (e.g. "MPP Tracker")

  STEP 4: Add a Custom HTML block and paste ONLY the iframe below.

  src="https://ontariocorruption.org/mpp-tracker/"
  title="Ontario MPP Voting Tracker"
  width="100%"
  height="900"
  style="border: none; min-height: 80vh; display: block;"
  loading="lazy"
></iframe>
