name: Sync from Google Sheets

# Editors only change the Google Sheet. This job downloads it, rebuilds JSON,
# commits if needed, and deploys GitHub Pages.
#
# Note: commits made with GITHUB_TOKEN do not trigger other workflows, so this
# workflow deploys Pages itself when data changes.

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Sync from Google Sheets
        run: python scripts/sync_from_sheets.py

      - name: Commit if data changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Current Ontario MPPs & How They Vote..xlsx" data/mpps.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No spreadsheet changes."
          else
            git commit -m "Auto-sync MPP data from Google Sheets"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload site
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        id: deployment
        uses: actions/deploy-pages@v4
